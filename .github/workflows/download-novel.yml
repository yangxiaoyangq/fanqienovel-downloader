name: 在线下载小说 (仅TXT)
on:
  workflow_dispatch:
    inputs:
      novel_id:
        description: '小说ID（番茄小说页面URL中的数字）'
        required: true
jobs:
  download-novel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests ebooklib tqdm beautifulsoup4 lxml qrcode pillow flask
      - name: Download novel
        run: |
          cd src
          echo "${{ github.event.inputs.novel_id }}" | python ref_main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: novel-${{ github.event.inputs.novel_id }}-txt
          path: src/*.txt
